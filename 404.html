<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- No header on this page: the error screen stands on its own, and the
       "Return Home" button is the way out. The mobile drawer went with it,
       since the hamburger that opened it lived in the header. -->

  <main id="main">
    <section class="error-page">
      <div class="hero__bg" aria-hidden="true">
        <div class="aurora"></div>
        <div class="hero__glow"></div>
        <span class="blob blob--1" data-parallax="20"></span>
        <span class="blob blob--2" data-parallax="28"></span>
      </div>

      <div class="stars" aria-hidden="true"></div>
      <span class="shape shape--1" aria-hidden="true"></span>
      <span class="shape shape--2" aria-hidden="true"></span>
      <span class="shape shape--3" aria-hidden="true"></span>
      <span class="shape shape--4" aria-hidden="true"></span>

      <div class="error-page__inner">
        <p class="error-code" data-aos="zoom-in">404</p>
        <h1 data-aos="fade-up" data-aos-delay="90">Lost in the <span class="gradient-text">Stackly</span></h1>
        <p class="mt-sm" data-aos="fade-up" data-aos-delay="160">
          The page you're looking for drifted off somewhere between here and Andromeda.
          Let's get you back to solid ground.
        </p>

        <div class="cta-banner__actions" data-aos="fade-up" data-aos-delay="240">
          <a class="btn btn--primary btn--lg" href="index.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 10.5 12 3l9 7.5" /><path d="M5 9.5V20h14V9.5" /><path d="M10 20v-6h4v6" />
            </svg>
            <span class="btn__label">Back to Home</span>
          </a>
          <button class="btn btn--ghost btn--lg" type="button" data-go-back>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M19 12H5M11 18l-6-6 6-6" />
            </svg>
            <span class="btn__label">Go Back</span>
          </button>
        </div>

        <p class="mt-lg" style="font-size:.85rem;color:var(--text-muted)" data-aos="fade">
          Or try <a href="features.html" class="text-purple">Features</a>,
          <a href="pricing.html" class="text-purple">Pricing</a> or
          <a href="blog.html" class="text-purple">the Blog</a>.
        </p>
      </div>
    </section>
  </main>

  <script src="assets/js/aos.js"></script>

  <script src="assets/js/main.js"></script>
</body>
