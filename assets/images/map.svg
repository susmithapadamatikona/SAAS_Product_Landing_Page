<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500" role="img" aria-label="Stylised map of the Nebula AI office at 488 Market Street, San Francisco">
  <title>488 Market Street, San Francisco</title>
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12121D"/><stop offset="1" stop-color="#1F1E34"/>
    </linearGradient>
    <radialGradient id="mglow" cx="50%" cy="50%" r="42%">
      <stop offset="0" stop-color="#6D5DF6" stop-opacity=".38"/>
      <stop offset="1" stop-color="#6D5DF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="mb" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>

  <rect width="1200" height="500" fill="url(#mbg)"/>

  <!-- water -->
  <path d="M980 0 L1200 0 L1200 500 L1080 500 C1060 400 1010 300 980 180 Z" fill="#09090C" opacity=".55"/>
  <path d="M980 0 C1010 160 1060 330 1080 500" fill="none" stroke="#56B6FF" stroke-opacity=".28" stroke-width="2"/>

  <!-- blocks -->
  <g fill="#09090C" fill-opacity=".45" stroke="#6D5DF6" stroke-opacity=".22">
    <rect x="60" y="60" width="150" height="110" rx="8"/>
    <rect x="260" y="60" width="150" height="110" rx="8"/>
    <rect x="460" y="60" width="150" height="110" rx="8"/>
    <rect x="660" y="60" width="150" height="110" rx="8"/>
    <rect x="60" y="220" width="150" height="110" rx="8"/>
    <rect x="260" y="220" width="150" height="110" rx="8"/>
    <rect x="660" y="220" width="150" height="110" rx="8"/>
    <rect x="60" y="380" width="150" height="110" rx="8"/>
    <rect x="260" y="380" width="150" height="110" rx="8"/>
    <rect x="460" y="380" width="150" height="110" rx="8"/>
    <rect x="660" y="380" width="150" height="110" rx="8"/>
    <rect x="460" y="220" width="150" height="110" rx="8" fill="#6D5DF6" fill-opacity=".16" stroke="#B8A7FF" stroke-opacity=".6"/>
  </g>

  <!-- roads -->
  <g stroke="#B19CFF" stroke-opacity=".22" stroke-width="10" stroke-linecap="round">
    <path d="M30 190 H 960"/><path d="M30 350 H 960"/>
    <path d="M230 30 V 470"/><path d="M430 30 V 470"/><path d="M630 30 V 470"/>
  </g>
  <!-- highlighted route -->
  <path d="M230 350 H 535 V 275" fill="none" stroke="url(#mbg)" stroke-width="0"/>
  <path d="M230 350 H 535 V 285" fill="none" stroke="#B8A7FF" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 8" opacity=".9"/>

  <rect width="1200" height="500" fill="url(#mglow)"/>

  <!-- pin -->
  <g transform="translate(535 275)">
    <circle r="46" fill="#6D5DF6" opacity=".3" filter="url(#mb)"/>
    <circle r="30" fill="none" stroke="#B8A7FF" stroke-width="1.5" opacity=".65"/>
    <path d="M0 14 C-16 -6 -22 -14 -22 -24 A22 22 0 1 1 22 -24 C22 -14 16 -6 0 14 Z" fill="#6D5DF6" stroke="#B8A7FF" stroke-width="2"/>
    <circle cy="-24" r="8" fill="#09090C"/>
  </g>
</svg>
