<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Connected node graph representing integration testing">
  <title>Connected node graph representing integration testing</title>

  <defs>
    <linearGradient id="bgintegrationtests" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090C"/>
      <stop offset=".45" stop-color="#12121D"/>
      <stop offset="1" stop-color="#1F1E34"/>
    </linearGradient>
    <radialGradient id="glowAintegrationtests" cx="22%" cy="18%" r="62%">
      <stop offset="0" stop-color="#56B6FF" stop-opacity=".55"/>
      <stop offset="1" stop-color="#56B6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBintegrationtests" cx="82%" cy="88%" r="58%">
      <stop offset="0" stop-color="#6D5DF6" stop-opacity=".45"/>
      <stop offset="1" stop-color="#6D5DF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="strokeintegrationtests" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B8A7FF"/>
      <stop offset="1" stop-color="#6D5DF6"/>
    </linearGradient>
    <linearGradient id="fillintegrationtests" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#56B6FF" stop-opacity=".9"/>
      <stop offset="1" stop-color="#56B6FF" stop-opacity=".15"/>
    </linearGradient>
    <filter id="softintegrationtests" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="grainintegrationtests">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope=".05"/></feComponentTransfer>
    </filter>
    <pattern id="gridintegrationtests" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#6D5DF6" stroke-opacity=".13" stroke-width="1"/>
    </pattern>
    <clipPath id="clipintegrationtests"><rect width="800" height="450" rx="0"/></clipPath>
  </defs>
  <g clip-path="url(#clipintegrationtests)">

  <rect width="800" height="450" fill="url(#bgintegrationtests)"/>
