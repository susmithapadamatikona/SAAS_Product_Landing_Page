    <rect x="672" y="135" width="26" height="4" rx="2" fill="#B8A7FF" opacity=".9"/>
    <rect x="672" y="146" width="38" height="4" rx="2" fill="#B19CFF" opacity=".35"/>
    <circle cx="722" cy="146" r="4.5" fill="#6D5DF6"/>
    <rect x="660" y="265" width="62" height="52" rx="12" fill="#1F1E34" stroke="url(#strokeapprovalgates)" stroke-opacity=".6" stroke-width="1.5"/>
    <rect x="672" y="280" width="26" height="4" rx="2" fill="#6D5DF6" opacity=".9"/>
    <rect x="672" y="291" width="38" height="4" rx="2" fill="#B19CFF" opacity=".35"/>
    <circle cx="722" cy="291" r="4.5" fill="#6D5DF6"/>
<rect width="800" height="450" filter="url(#grainapprovalgates)" opacity=".55"/>
  </g>
</svg>
