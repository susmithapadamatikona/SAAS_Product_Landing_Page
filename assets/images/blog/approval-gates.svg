<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Workflow diagram with approval gates">
  <title>Workflow diagram with approval gates</title>

  <defs>
    <linearGradient id="bgapprovalgates" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090C"/>
      <stop offset=".45" stop-color="#12121D"/>
      <stop offset="1" stop-color="#1F1E34"/>
    </linearGradient>
    <radialGradient id="glowAapprovalgates" cx="22%" cy="18%" r="62%">
      <stop offset="0" stop-color="#6D5DF6" stop-opacity=".55"/>
      <stop offset="1" stop-color="#6D5DF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBapprovalgates" cx="82%" cy="88%" r="58%">
      <stop offset="0" stop-color="#6D5DF6" stop-opacity=".45"/>
      <stop offset="1" stop-color="#6D5DF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="strokeapprovalgates" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B8A7FF"/>
      <stop offset="1" stop-color="#6D5DF6"/>
    </linearGradient>
    <linearGradient id="fillapprovalgates" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6D5DF6" stop-opacity=".9"/>
      <stop offset="1" stop-color="#6D5DF6" stop-opacity=".15"/>
    </linearGradient>
    <filter id="softapprovalgates" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="grainapprovalgates">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope=".05"/></feComponentTransfer>
    </filter>
    <pattern id="gridapprovalgates" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#6D5DF6" stroke-opacity=".13" stroke-width="1"/>
    </pattern>
    <clipPath id="clipapprovalgates"><rect width="800" height="450" rx="0"/></clipPath>
  </defs>
  <g clip-path="url(#clipapprovalgates)">

  <rect width="800" height="450" fill="url(#bgapprovalgates)"/>
  <rect width="800" height="450" fill="url(#gridapprovalgates)"/>
  <rect width="800" height="450" fill="url(#glowAapprovalgates)"/>
  <rect width="800" height="450" fill="url(#glowBapprovalgates)"/>
<path d="M182 176 C 210 176, 210 121, 300 121"
