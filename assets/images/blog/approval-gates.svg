      fill="none" stroke="url(#strokeapprovalgates)" stroke-opacity=".5" stroke-width="1.8" stroke-dasharray="6 5"/>
    <rect x="120" y="150" width="62" height="52" rx="12" fill="#1F1E34" stroke="url(#strokeapprovalgates)" stroke-opacity=".6" stroke-width="1.5"/>
    <rect x="132" y="165" width="26" height="4" rx="2" fill="#B8A7FF" opacity=".9"/>
    <rect x="132" y="176" width="38" height="4" rx="2" fill="#B19CFF" opacity=".35"/>
    <circle cx="182" cy="176" r="4.5" fill="#6D5DF6"/>
    <rect x="300" y="95" width="62" height="52" rx="12" fill="#1F1E34" stroke="url(#strokeapprovalgates)" stroke-opacity=".6" stroke-width="1.5"/>
    <rect x="312" y="110" width="26" height="4" rx="2" fill="#6D5DF6" opacity=".9"/>
    <rect x="312" y="121" width="38" height="4" rx="2" fill="#B19CFF" opacity=".35"/>
    <circle cx="362" cy="121" r="4.5" fill="#6D5DF6"/>
    <rect x="300" y="250" width="62" height="52" rx="12" fill="#1F1E34" stroke="url(#strokeapprovalgates)" stroke-opacity=".6" stroke-width="1.5"/>
    <rect x="312" y="265" width="26" height="4" rx="2" fill="#B8A7FF" opacity=".9"/>
    <rect x="312" y="276" width="38" height="4" rx="2" fill="#B19CFF" opacity=".35"/>
    <circle cx="362" cy="276" r="4.5" fill="#6D5DF6"/>
    <rect x="490" y="170" width="62" height="52" rx="12" fill="#1F1E34" stroke="url(#strokeapprovalgates)" stroke-opacity=".6" stroke-width="1.5"/>
