<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Layered panels representing a settings audit">
  <title>Layered panels representing a settings audit</title>

  <defs>
    <linearGradient id="bgsettingsaudit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090C"/>
      <stop offset=".45" stop-color="#12121D"/>
      <stop offset="1" stop-color="#1F1E34"/>
    </linearGradient>
    <radialGradient id="glowAsettingsaudit" cx="22%" cy="18%" r="62%">
      <stop offset="0" stop-color="#F7B955" stop-opacity=".55"/>
      <stop offset="1" stop-color="#F7B955" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBsettingsaudit" cx="82%" cy="88%" r="58%">
      <stop offset="0" stop-color="#6D5DF6" stop-opacity=".45"/>
      <stop offset="1" stop-color="#6D5DF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="strokesettingsaudit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B8A7FF"/>
      <stop offset="1" stop-color="#6D5DF6"/>
    </linearGradient>
    <linearGradient id="fillsettingsaudit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7B955" stop-opacity=".9"/>
      <stop offset="1" stop-color="#F7B955" stop-opacity=".15"/>
    </linearGradient>
    <filter id="softsettingsaudit" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="grainsettingsaudit">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope=".05"/></feComponentTransfer>
    </filter>
    <pattern id="gridsettingsaudit" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#6D5DF6" stroke-opacity=".13" stroke-width="1"/>
    </pattern>
    <clipPath id="clipsettingsaudit"><rect width="800" height="450" rx="0"/></clipPath>
  </defs>
  <g clip-path="url(#clipsettingsaudit)">

  <rect width="800" height="450" fill="url(#bgsettingsaudit)"/>
  <rect width="800" height="450" fill="url(#gridsettingsaudit)"/>
  <rect width="800" height="450" fill="url(#glowAsettingsaudit)"/>
  <rect width="800" height="450" fill="url(#glowBsettingsaudit)"/>

    <g transform="translate(400 230)">
      <g opacity="0.95">
          <path d="M-150 -70 L0 -122 L150 -70 L0 -18 Z"
            fill="#F7B955" fill-opacity="0.28"
            stroke="url(#strokesettingsaudit)" stroke-width="2"/>
        </g><g opacity="0.73">
          <path d="M-150 -8 L0 -60 L150 -8 L0 44 Z"
            fill="#1F1E34" fill-opacity="0.9"
            stroke="url(#strokesettingsaudit)" stroke-width="2"/>
        </g><g opacity="0.51">
          <path d="M-150 54 L0 2 L150 54 L0 106 Z"
            fill="#1F1E34" fill-opacity="0.9"
            stroke="url(#strokesettingsaudit)" stroke-width="2"/>
        </g>
      <path d="M-150 -70 L0 -122 L150 -70 L0 -18 Z" fill="none" stroke="#F7B955" stroke-width="12" opacity=".14" filter="url(#softsettingsaudit)"/>
    </g>
    <circle cx="400" cy="108" r="6" fill="#B8A7FF"/>
<rect width="800" height="450" filter="url(#grainsettingsaudit)" opacity=".55"/>
  </g>
</svg>
