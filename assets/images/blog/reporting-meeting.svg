<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Rising bar chart representing time lost to reporting">
  <title>Rising bar chart representing time lost to reporting</title>

  <defs>
    <linearGradient id="bgreportingmeeting" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090C"/>
      <stop offset=".45" stop-color="#12121D"/>
      <stop offset="1" stop-color="#1F1E34"/>
    </linearGradient>
    <radialGradient id="glowAreportingmeeting" cx="22%" cy="18%" r="62%">
      <stop offset="0" stop-color="#F7B955" stop-opacity=".55"/>
      <stop offset="1" stop-color="#F7B955" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBreportingmeeting" cx="82%" cy="88%" r="58%">
      <stop offset="0" stop-color="#6D5DF6" stop-opacity=".45"/>
      <stop offset="1" stop-color="#6D5DF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="strokereportingmeeting" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B8A7FF"/>
      <stop offset="1" stop-color="#6D5DF6"/>
    </linearGradient>
    <linearGradient id="fillreportingmeeting" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7B955" stop-opacity=".9"/>
      <stop offset="1" stop-color="#F7B955" stop-opacity=".15"/>
    </linearGradient>
    <filter id="softreportingmeeting" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="grainreportingmeeting">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope=".05"/></feComponentTransfer>
    </filter>
    <pattern id="gridreportingmeeting" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#6D5DF6" stroke-opacity=".13" stroke-width="1"/>
    </pattern>
    <clipPath id="clipreportingmeeting"><rect width="800" height="450" rx="0"/></clipPath>
  </defs>
  <g clip-path="url(#clipreportingmeeting)">

  <rect width="800" height="450" fill="url(#bgreportingmeeting)"/>
  <rect width="800" height="450" fill="url(#gridreportingmeeting)"/>
  <rect width="800" height="450" fill="url(#glowAreportingmeeting)"/>
  <rect width="800" height="450" fill="url(#glowBreportingmeeting)"/>
<rect x="130" y="332" width="44" height="38" rx="8" fill="url(#fillreportingmeeting)"/><rect x="170.92000000000002" y="308" width="44" height="62" rx="8" fill="url(#fillreportingmeeting)"/><rect x="211.84" y="322" width="44" height="48" rx="8" fill="url(#fillreportingmeeting)"/><rect x="252.76" y="282" width="44" height="88" rx="8" fill="url(#fillreportingmeeting)"/><rect x="293.68" y="300" width="44" height="70" rx="8" fill="url(#fillreportingmeeting)"/><rect x="334.6" y="258" width="44" height="112" rx="8" fill="url(#fillreportingmeeting)"/><rect x="375.52" y="274" width="44" height="96" rx="8" fill="url(#fillreportingmeeting)"/><rect x="416.44" y="230" width="44" height="140" rx="8" fill="url(#fillreportingmeeting)"/><rect x="457.36" y="246" width="44" height="124" rx="8" fill="url(#fillreportingmeeting)"/><rect x="498.28" y="202" width="44" height="168" rx="8" fill="url(#fillreportingmeeting)"/>
    <polyline points="152,310 192.92000000000002,286 233.84,300 274.76,260 315.68,278 356.6,236 397.52,252 438.44,208 479.36,224 520.28,180" fill="none" stroke="#B8A7FF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity=".95"/>
    <polyline points="152,310 192.92000000000002,286 233.84,300 274.76,260 315.68,278 356.6,236 397.52,252 438.44,208 479.36,224 520.28,180" fill="none" stroke="#F7B955" stroke-width="9" opacity=".18" filter="url(#softreportingmeeting)"/>
    <circle cx="152" cy="310" r="4.5" fill="#09090C" stroke="#B8A7FF" stroke-width="2.4"/><circle cx="192.92000000000002" cy="286" r="4.5" fill="#09090C" stroke="#B8A7FF" stroke-width="2.4"/><circle cx="233.84" cy="300" r="4.5" fill="#09090C" stroke="#B8A7FF" stroke-width="2.4"/><circle cx="274.76" cy="260" r="4.5" fill="#09090C" stroke="#B8A7FF" stroke-width="2.4"/><circle cx="315.68" cy="278" r="4.5" fill="#09090C" stroke="#B8A7FF" stroke-width="2.4"/><circle cx="356.6" cy="236" r="4.5" fill="#09090C" stroke="#B8A7FF" stroke-width="2.4"/><circle cx="397.52" cy="252" r="4.5" fill="#09090C" stroke="#B8A7FF" stroke-width="2.4"/><circle cx="438.44" cy="208" r="4.5" fill="#09090C" stroke="#B8A7FF" stroke-width="2.4"/><circle cx="479.36" cy="224" r="4.5" fill="#09090C" stroke="#B8A7FF" stroke-width="2.4"/><circle cx="520.28" cy="180" r="4.5" fill="#09090C" stroke="#B8A7FF" stroke-width="2.4"/>
    <line x1="100" y1="370" x2="700" y2="370" stroke="#6D5DF6" stroke-opacity=".35" stroke-width="1.5"/>
<rect width="800" height="450" filter="url(#grainreportingmeeting)" opacity=".55"/>
  </g>
</svg>
