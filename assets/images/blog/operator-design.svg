<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Stacked layers representing product design">
  <title>Stacked layers representing product design</title>

  <defs>
    <linearGradient id="bgoperatordesign" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090C"/>
      <stop offset=".45" stop-color="#12121D"/>
      <stop offset="1" stop-color="#1F1E34"/>
    </linearGradient>
    <radialGradient id="glowAoperatordesign" cx="22%" cy="18%" r="62%">
      <stop offset="0" stop-color="#B8A7FF" stop-opacity=".55"/>
      <stop offset="1" stop-color="#B8A7FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBoperatordesign" cx="82%" cy="88%" r="58%">
      <stop offset="0" stop-color="#6D5DF6" stop-opacity=".45"/>
      <stop offset="1" stop-color="#6D5DF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="strokeoperatordesign" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#B8A7FF"/>
      <stop offset="1" stop-color="#6D5DF6"/>
    </linearGradient>
    <linearGradient id="filloperatordesign" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B8A7FF" stop-opacity=".9"/>
      <stop offset="1" stop-color="#B8A7FF" stop-opacity=".15"/>
    </linearGradient>
    <filter id="softoperatordesign" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="grainoperatordesign">
      <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope=".05"/></feComponentTransfer>
    </filter>
    <pattern id="gridoperatordesign" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#6D5DF6" stroke-opacity=".13" stroke-width="1"/>
    </pattern>
    <clipPath id="clipoperatordesign"><rect width="800" height="450" rx="0"/></clipPath>
  </defs>
  <g clip-path="url(#clipoperatordesign)">

  <rect width="800" height="450" fill="url(#bgoperatordesign)"/>
  <rect width="800" height="450" fill="url(#gridoperatordesign)"/>
  <rect width="800" height="450" fill="url(#glowAoperatordesign)"/>
  <rect width="800" height="450" fill="url(#glowBoperatordesign)"/>

    <g transform="translate(400 230)">
      <g opacity="0.95">
          <path d="M-150 -70 L0 -122 L150 -70 L0 -18 Z"
            fill="#B8A7FF" fill-opacity="0.28"
            stroke="url(#strokeoperatordesign)" stroke-width="2"/>
        </g><g opacity="0.73">
          <path d="M-150 -8 L0 -60 L150 -8 L0 44 Z"
            fill="#1F1E34" fill-opacity="0.9"
            stroke="url(#strokeoperatordesign)" stroke-width="2"/>
        </g><g opacity="0.51">
          <path d="M-150 54 L0 2 L150 54 L0 106 Z"
            fill="#1F1E34" fill-opacity="0.9"
            stroke="url(#strokeoperatordesign)" stroke-width="2"/>
        </g>
      <path d="M-150 -70 L0 -122 L150 -70 L0 -18 Z" fill="none" stroke="#B8A7FF" stroke-width="12" opacity=".14" filter="url(#softoperatordesign)"/>
    </g>
    <circle cx="400" cy="108" r="6" fill="#B8A7FF"/>
<rect width="800" height="450" filter="url(#grainoperatordesign)" opacity=".55"/>
  </g>
</svg>
